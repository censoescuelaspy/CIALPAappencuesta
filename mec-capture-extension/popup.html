<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>CIALPA Captura MEC</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px;
        width: 360px;
        color: #1f2933;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin: 10px 0 4px;
      }

      input[type="url"] {
        box-sizing: border-box;
        width: 100%;
        padding: 8px;
      }

      button {
        border: 0;
        border-radius: 4px;
        cursor: pointer;
        padding: 8px 10px;
      }

      .primary {
        background: #146c94;
        color: #fff;
      }

      .secondary {
        background: #e5e7eb;
        color: #111827;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 8px;
        justify-content: space-between;
        margin-top: 10px;
      }

      pre {
        background: #f3f4f6;
        border-radius: 4px;
        max-height: 220px;
        overflow: auto;
        padding: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <strong>CIALPA Captura MEC</strong>

    <label for="endpointUrl">Endpoint de recepción</label>
    <input id="endpointUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec">

    <div class="row">
      <label>
        <input id="enabled" type="checkbox">
        Captura activa
      </label>
      <button id="save" class="primary">Guardar</button>
    </div>

    <div class="row">
      <span id="count">0 eventos</span>
      <button id="clear" class="secondary">Limpiar</button>
    </div>

    <pre id="preview"></pre>

    <script src="popup.js"></script>
  </body>
</html>
